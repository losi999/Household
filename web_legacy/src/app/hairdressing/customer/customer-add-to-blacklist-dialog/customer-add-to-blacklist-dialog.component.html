<h1 mat-dialog-title>Hozzáadás tiltólistához</h1>
<div mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSave()" id="add-to-blacklist-form">
    <household-customer-autocomplete-input formControlName="customer" label="Vendég" [exclude]="data.excludedCustomerIds" />
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button cdkFocusInitial data-testId="submit-button" form="add-to-blacklist-form">Mentés</button>
  <button mat-button mat-dialog-close type="button">Mégse</button>
</div>
