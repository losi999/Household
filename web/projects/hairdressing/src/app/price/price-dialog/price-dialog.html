<div mat-dialog-title>{{price ? 'Ár szerkesztése' : 'Új ár'}}</div>
<div mat-dialog-content>
  <div>
    <shared-clearable-input label="Név" [formField]="priceForm.name" />
  </div>
  <div>
    <shared-amount-input label="Ár" type="number" currency="Ft" [formField]="priceForm.amount" [signHidden]="true" />
  </div>
  <mat-form-field appearance="fill">
    <mat-label>Mértékegység</mat-label>
    <mat-select [formField]="priceForm.unitOfMeasurement">
      @for (u of unitsOfMeasurement; track $index) {
      <mat-option [value]="u">
        {{u}}
      </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
<div mat-dialog-actions>
  <button matButton="filled" cdkFocusInitial (click)="onSave()">Mentés</button>
  <button matButton="text" type="button" mat-dialog-close>Mégse</button>
</div>
