<div class="prices">
  @for(p of prices(); track $index) {
  <div [style.grid-area]="'name'" [style.grid-row]="$index + 1">
    {{p.name}}
  </div>
  <div [style.grid-area]="'quantity'" [style.grid-row]="$index + 1">
    @switch(p.unitOfMeasurement) {
    @case('db') {
    {{p.quantity}}x
    }
    @case('g') {
    {{p.quantity}} g
    }
    @case('óra') {
    {{p.quantity * 60 | minutesToHour}} óra
    }
    }
  </div>
  <div [style.grid-area]="'amount'" [style.grid-row]="$index + 1">
    {{p.amount * (p.quantity ?? 1)}} Ft
  </div>
  }
  <mat-divider [style.grid-column]="'span 3'" [style.grid-row]="prices().length + 1" />
  <div [style.grid-area]="'amount'" [style.grid-row]="prices().length + 2">
    {{total()}} Ft
  </div>
</div>
