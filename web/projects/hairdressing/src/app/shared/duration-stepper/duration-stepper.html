<div class="duration">
  <mat-label>Időtartam</mat-label>
  <button matIconButton sharedHoldableButton (hold)="onSetDuration(-1)" type="button" [disabled]="value?.() === 1">
    <mat-icon>remove</mat-icon>
  </button>
  <span>{{value?.() | timeSlotToTime}} óra</span>
  <button matIconButton sharedHoldableButton (hold)="onSetDuration(1)" type="button">
    <mat-icon>add</mat-icon>
  </button>
</div>
