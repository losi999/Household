<div mat-dialog-title>{{title()}}</div>
<div mat-dialog-content>
  <shared-clearable-input label="Megnevezés" [formField]="entryForm.title" />
  <shared-clearable-input type="area" label="Leírás" [formField]="entryForm.description" />
  <mat-form-field>
    <mat-label>Dátum</mat-label>
    <input matInput [formField]="entryForm.day" [matDatepicker]="picker" placeholder="Dátum" (click)="picker.open()" readonly>
    <mat-datepicker-toggle matPrefix [for]="picker" tabindex="-1" />
    <mat-datepicker #picker />
  </mat-form-field>
  <hairdressing-duration-stepper [(value)]="duration" />
  <mat-slider min="0" [max]="96-duration()">
    <input matSliderThumb [(ngModel)]="start">
  </mat-slider>{{start() | timeSlotToTime}} - {{start() + duration() | timeSlotToTime}}

<div mat-dialog-actions>
  <button matButton="filled" cdkFocusInitial form="calendar-entry-form" (click)="onSubmit()">Mentés</button>
  <button matButton="text" mat-dialog-close type="button">Mégse</button>
