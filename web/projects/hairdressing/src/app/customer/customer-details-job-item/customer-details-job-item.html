<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{job().name}}</mat-card-title>
    <mat-card-subtitle>{{job().duration | timeSlotToTime}} óra</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    {{job().description}}
    <hairdressing-job-price-summary [cost]="job()" />
  </mat-card-content>
  <mat-card-actions>
    <button matButton="filled" data-testId="search-button" [routerLink]="['/']" [queryParams]="{customerId: customerId, jobName: job().name}">
      <mat-icon>calendar_add_on</mat-icon>
      Időpont keresése</button>
    <button matIconButton data-testId="menu-button" [matMenuTriggerFor]="menu" color="primary">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item data-testId="edit-job-button" (click)="onEdit()">
        <mat-icon>edit</mat-icon>
        <span>Szerkesztés</span>
      </button>
      <button mat-menu-item data-testId="delete-job-button" color="warn" (click)="onDelete()">
        <mat-icon>delete</mat-icon>
        <span>Törlés</span>
      </button>
    </mat-menu>
  </mat-card-actions>
</mat-card>
