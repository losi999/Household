<h1 mat-dialog-title>{{data.title}}</h1>
@if(data.content) {
<div mat-dialog-content>{{data.content}}</div>
}
<div mat-dialog-actions>
  <button matButton="filled" [mat-dialog-close]="true" cdkFocusInitial>Igen</button> <!-- TODO: danger button -->
  <button matButton="text" [mat-dialog-close]="false">Nem</button>
</div>
