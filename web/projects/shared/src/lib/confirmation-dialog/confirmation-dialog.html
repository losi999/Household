<div matDialogTitle>{{data.title}}</div>
@if(data.content) {
<mat-dialog-content>{{data.content}}</mat-dialog-content>
}
<mat-dialog-actions>
  <button matButton="filled" class="danger" [mat-dialog-close]="true" cdkFocusInitial>Igen</button>
  <button matButton="text" [mat-dialog-close]="false">Nem</button>
</mat-dialog-actions>
