<h2>{{data.title}}</h2>
<mat-action-list>
  @for(item of data.items; track $index) {
  <button mat-list-item type="button" (click)="onSelect(item)">
    <mat-icon matListItemIcon>{{itemMapping[item].icon}}</mat-icon>
    <div matListItemTitle>{{itemMapping[item].label}}</div>
  </button>
  }
</mat-action-list>
