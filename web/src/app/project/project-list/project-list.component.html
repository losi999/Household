@if (projects.length === 0) {
<ngx-skeleton-loader count="10" appearance="line" animation="progress" [theme]="{
    height: '48px'
  }" />
}
<mat-action-list>
  @for (project of projects; track $index) {
  <household-project-list-item [project]="project"></household-project-list-item>
  }
</mat-action-list>
