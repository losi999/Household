<household-toolbar title="Vendégek">
  <button mat-icon-button (click)="onEdit()" type="button">
    <mat-icon>edit</mat-icon>
  </button>
</household-toolbar>

<ng-container *ngIf="customer | async as cust">
  <div class="name">
    {{cust.name}}
  </div>
  <div class="rating">
    <mat-icon [ngClass]="cust.rating === 1 ? 'green' : ''">sentiment_stressed</mat-icon>
    <mat-icon [ngClass]="cust.rating === 2 ? 'green' : ''">sentiment_dissatisfied</mat-icon>
    <mat-icon [ngClass]="cust.rating === 3 ? 'green' : ''">sentiment_neutral</mat-icon>
    <mat-icon [ngClass]="cust.rating === 4 ? 'green' : ''">sentiment_satisfied</mat-icon>
    <mat-icon [ngClass]="cust.rating === 5 ? 'green' : ''">sentiment_excited</mat-icon>
  </div>
  <div *ngIf="cust.description" class="description">
    {{cust.description}}
  </div>
  <mat-divider />
  <div class="jobs">
    <household-icon-text icon="content_cut" text="Munkák" size="medium" />
    <button mat-icon-button type="button" (click)="onCreateJob()">
      <mat-icon>add</mat-icon>
    </button>
  </div>
  <div class="job-list">
    <household-customer-details-job-item *ngFor="let j of cust.jobs" [job]="j" />
  </div>

</ng-container>
