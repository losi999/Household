<h1 mat-dialog-title>Kapott készpénz</h1>

<div mat-dialog-content>
  <form (ngSubmit)="onSave()" [formGroup]="form" id="form">
    <household-amount-input label="Összeg" currency="Ft" formControlName="amount" [signDisabled]="false" />
  </form>
</div>

<div mat-dialog-actions>
  <button mat-button cdkFocusInitial form="form">Mentés</button>
  <button mat-button mat-dialog-close type="button">Mégse</button>
</div>
