@let cd = (calendarDay | async);

<ng-template #weekend>
  <div class="no-work" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #holiday>
  <div class="holiday" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #personal>
  <div class="off-day" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #workday>
  <div class="no-work" [style.grid-row]="1 + '/ span ' + (cd?.start)"></div>
  <div class="no-work" [style.grid-row]="(cd?.end) + '/ 97'"></div>
</ng-template>

<div class="day">
  <ng-container [ngSwitch]="cd?.type">
    <ng-container *ngSwitchCase="'weekend'" [ngTemplateOutlet]="weekend"></ng-container>
    <ng-container *ngSwitchCase="'personal'" [ngTemplateOutlet]="personal"></ng-container>
    <ng-container *ngSwitchCase="'holiday'" [ngTemplateOutlet]="holiday"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="workday"></ng-container>
  </ng-container>
  <button *ngFor="let e of cd?.entries" [ngClass]="e.type" [style.grid-row]="e.start + ' / ' + e.end" (click)="onEntryClick(e)">{{e.title}}</button>
</div>
