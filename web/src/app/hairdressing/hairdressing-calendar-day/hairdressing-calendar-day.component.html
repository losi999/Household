<ng-template #weekend>
  <div class="no-work" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #holiday>
  <div class="holiday" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #personal>
  <div class="off-day" [style.grid-row]="'1 / 97'"></div>
</ng-template>

<ng-template #workday>
  <div class="no-work" [style.grid-row]="1 + '/ span ' + (day.start)"></div>
  <div class="no-work" [style.grid-row]="(day.end + 1) + '/ 97'"></div>
  <div class="work" *ngFor="let w of day.workEntries" [style.grid-row]="w | timespan">{{w.title}}</div>
  <div class="personal" *ngFor="let w of day.personalEntries" [style.grid-row]="w | timespan">{{w.title}}</div>
</ng-template>

<div class="day" (click)="onGridClick($event)" role="button" tabindex="0" (keydown)="null">
  <ng-container [ngSwitch]="day.dayType">
    <ng-container *ngSwitchCase="'weekend'" [ngTemplateOutlet]="weekend"></ng-container>
    <ng-container *ngSwitchCase="'personal'" [ngTemplateOutlet]="personal"></ng-container>
    <ng-container *ngSwitchCase="'holiday'" [ngTemplateOutlet]="holiday"></ng-container>
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="workday"></ng-container>
  </ng-container>
</div>
