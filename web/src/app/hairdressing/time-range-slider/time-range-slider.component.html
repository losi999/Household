<form [formGroup]="form">
  <mat-slider [min]="min" [max]="max">
    <input formControlName="start" matSliderStartThumb>
    <input formControlName="end" matSliderEndThumb>
  </mat-slider>
  {{form.value.start | timeSlotToDate}} - {{form.value.end | timeSlotToDate}} (időtartam:{{(form.value.end - form.value.start + 1) | timeSlotToDate}} óra)
</form>
