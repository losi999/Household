@if (transaction?.invoiceNumber) {
  <household-transaction-details-row
    icon="receipt"
    [text]="transaction.invoiceNumber"
  />
}
@if (transaction?.billingStartDate && transaction?.billingEndDate) {
  <household-transaction-details-row
    icon="calendar_month"
    [text]="
      (transaction.billingStartDate | date: 'yyyy. MMM dd.') +
      ' - ' +
      (transaction.billingEndDate | date: 'yyyy. MMM dd.')
    "
  />
}
