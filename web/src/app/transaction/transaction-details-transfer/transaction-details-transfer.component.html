@if (transaction?.transactionType === "transfer") {
  @if (twoWayDisplay) {
    <household-transaction-details-row
      [icon]="'arrow_left_alt'"
      [text]="transaction.amount < 0 ? transaction.account.fullName : transaction.transferAccount.fullName"
      rowColor="red"
    />
    <household-transaction-details-row
      [icon]="'arrow_right_alt'"
      [text]="transaction.amount < 0 ? transaction.transferAccount.fullName : transaction.account.fullName"
      rowColor="green"
    />
  } @else {
    @if (transaction.transferAccount) {
      <household-transaction-details-row
        [icon]="'arrow_' + (transaction.amount > 0 ? 'left' : 'right') + '_alt'"
        [text]="transaction.transferAccount.fullName"
        [rowColor]="transaction.amount > 0 ? 'green' : 'red'"
      />
    }
  }
}
