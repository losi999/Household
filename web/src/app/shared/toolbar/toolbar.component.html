<div class="header">
  <mat-toolbar color="primary">
    <div class="wrapper">
      <span class="main-menu">
        @if (authService.isLoggedIn) {
          <household-main-menu />
        }
      </span>
      <span>{{ title }}</span>
      <span class="spacer"></span>
      <ng-content></ng-content>
    </div>
  </mat-toolbar>
  @if (isInProgress | async) {
    <mat-progress-bar mode="indeterminate" />
  }
</div>
