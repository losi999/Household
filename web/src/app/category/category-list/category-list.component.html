@if (categories.length === 0) {
<ngx-skeleton-loader count="10" appearance="line" animation="progress" [theme]="{
    height: '48px'
  }" />
}
@for (category of categories; track $index) {
<mat-action-list>
  <household-category-list-item [category]="category" [categories]="categories" />
</mat-action-list>
}
