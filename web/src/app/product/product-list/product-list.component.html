@if (groups.length === 0) {
<ngx-skeleton-loader count="10" appearance="line" animation="progress" [theme]="{
    height: '48px'
  }" />
}
<mat-action-list>
  @for (category of groups; track $index) {
  @if (category.products?.length > 0) {
  <household-product-list-category-item [category]="category">
  </household-product-list-category-item>
  }
  }
</mat-action-list>
