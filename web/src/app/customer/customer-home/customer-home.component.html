<household-toolbar title="Vendégek">
  <button mat-icon-button type="button">
    <mat-icon>block</mat-icon>
  </button>
  <button mat-icon-button (click)="create()" type="button">

  </button>
</household-toolbar>
<household-clearable-input label="Keresés" #inp />
<household-customer-list [customers]="customers | async | autocompleteFilter: 'name' : inp.value" />
