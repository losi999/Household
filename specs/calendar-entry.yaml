openapi: "3.1.0"
info:
  title: Hairdressing calendar entry components
  version: 1.0.0
components:
  schemas:
    CalendarEntryId:
      type: object
      required:
        - calendarEntryId
      properties:
        calendarEntryId:
          type: string
          minLength: 1

    Day:
      type: object
      required:
        - day
      properties:
        day:
          type: string
          format: date

    Base:
      type: object
      required:
        - title
        - entryType
        - start
        - end
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        entryType:
          type: string
          enum:
            - work
            - personal
            - issue
        start:
          type: integer
          minimum: 1
          maximum: 96
        end:
          type: integer
          minimum: 1
          maximum: 96

    Response:
      allOf:
        - $ref: "calendar-entry.yaml#/components/schemas/Day"
        - type: object
          required:
            - day
            - dayType
            - entries
          properties:
            dayType:
              type: string
              enum:
                - workday
                - weekend
                - personal
                - holiday
            start:
              type: integer
              minimum: 1
              maximum: 96
            end:
              type: integer
              minimum: 1
              maximum: 96
            entries:
              type: array
              items:
                $ref: "calendar-entry.yaml#/components/schemas/Base"

    Request:
      allOf:
        - $ref: "#/components/schemas/Base"
        - $ref: "#/components/schemas/Day"
