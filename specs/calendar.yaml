openapi: "3.1.0"
info:
  title: Hairdressing calendar components
  version: 1.0.0
components:
  schemas:
    CalendarEntryId:
      type: object
      required:
        - calendarEntryId
      properties:
        calendarEntryId:
          type: string
          minLength: 1

    Day:
      type: object
      required:
        - day
      properties:
        day:
          type: string
          format: date

    Timespan:
      type: object
      required:
        - start
        - end
      properties:
        start:
          type: integer
          minimum: 1
          maximum: 96
        end:
          type: integer
          minimum: 1
          maximum: 96

    VacationRequest:
      type: object
      required:
        - dayType
      properties:
        dayType:
          type: string
          const: vacation

    WorkdayRequest:
      allOf:
        - $ref: "#/components/schemas/Timespan"
        - type: object
          required:
            - dayType
          properties:
            dayType:
              type: string
              const: workday

    Entry.Base:
      allOf:
        - $ref: "#/components/schemas/Timespan"
        - type: object
          required:
            - title
            - entryType
          properties:
            title:
              type: string
              minLength: 1
            description:
              type: string
              minLength: 1
            entryType:
              type: string
              enum:
                - work
                - personal
                - issue

    Day.Response:
      allOf:
        - $ref: "#/components/schemas/Day"
        - type: object
          required:
            - entries
            - dayType
          properties:
            entries:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/CalendarEntryId"
                  - $ref: "#/components/schemas/Entry.Base"
        - oneOf:
            - allOf:
                - $ref: "#/components/schemas/Timespan"
                - type: object
                  properties:
                    dayType:
                      type: string
                      const: workday
            - type: object
              properties:
                dayType:
                  type: string
                  enum:
                    - vacation
                    - holiday
                    - weekend

    Entry.Request:
      allOf:
        - $ref: "#/components/schemas/Entry.Base"
        - $ref: "#/components/schemas/Day"
