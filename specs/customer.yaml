openapi: "3.1.0"
info:
  title: Customer components
  version: 1.0.0
components:
  schemas:
    CustomerId:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: string
          minLength: 1

    Customer.Base:
      type: object
      required:
        - name
        - isGroup
        - rating
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        isGroup:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5

    Job.Base:
      type: object
      required:
        - name
        - duration
      properties:
        name:
          type: string
          minLength: 1
        duration:
          type: number
          exclusiveMinimum: 0
        description:
          type: string
          minLength: 1

    Quantity:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          exclusiveMinimum: 0

    Cost.Required:
      type: object
      required:
        - prices

    Cost.Request:
      type: object
      properties:
        additionalPrice:
          type: integer
        prices:
          type: array
          minItems: 1
          items:
            allOf:
              - $ref: "price.yaml#/components/schemas/PriceId"
              - $ref: "#/components/schemas/Quantity"

    Cost.Response:
      type: object
      properties:
        additionalPrice:
          type: integer
        prices:
          type: array
          minItems: 1
          items:
            allOf:
              - $ref: "price.yaml#/components/schemas/Response"
              - $ref: "#/components/schemas/Quantity"

    Job.Request:
      allOf:
        - $ref: "#/components/schemas/Job.Base"
        - $ref: "#/components/schemas/Cost.Request"
        - $ref: "#/components/schemas/Cost.Required"

    Job.Response:
      allOf:
        - $ref: "#/components/schemas/Job.Base"
        - $ref: "#/components/schemas/Cost.Response"
        - $ref: "#/components/schemas/Cost.Required"

    Jobs:
      type: object
      required:
        - jobs
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job.Response"
    Response.Base:
      allOf:
        - $ref: "#/components/schemas/CustomerId"
        - $ref: "#/components/schemas/Customer.Base"

    Response:
      allOf:
        - $ref: "#/components/schemas/Response.Base"
        - $ref: "#/components/schemas/Jobs"
        - type: object
          required:
            - blacklistedCustomers
          properties:
            blacklistedCustomers:
              type: array
              items:
                $ref: "#/components/schemas/Response.Base"

    Request:
      allOf:
        - $ref: "#/components/schemas/Customer.Base"
