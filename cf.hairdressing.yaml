AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  Env:
    Type: String

Mappings:
  EnvMapping:
    LOCAL:
      WebsiteDomain: local.bertajudit.hu
    DEV:
      WebsiteDomain: dev.bertajudit.hu
    CI:
      WebsiteDomain: ci.bertajudit.hu
    PROD:
      WebsiteDomain: bertajudit.hu

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false        

  WebSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${WebsiteBucket.Arn}/*"

  Website:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "HairdressingWeb ${Env}"
        Aliases:
          - !FindInMap [EnvMapping, !Ref Env, WebsiteDomain]
        ViewerCertificate:
          AcmCertificateArn: "{{resolve:ssm:HairdressingDomainCertificateArn:1}}"
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2019
        Enabled: true
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          MinTTL: 0
          MaxTTL: 0
          DefaultTTL: 0
          TargetOriginId: Web
          ForwardedValues:
            QueryString: true
        Origins:
          - DomainName: !Sub ${WebsiteBucket}.s3-website-${AWS::Region}.${AWS::URLSuffix}
            Id: Web
            CustomOriginConfig:
              OriginProtocolPolicy: http-only

  WebsiteDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: "bertajudit.hu."
      AliasTarget:
        DNSName: !GetAtt Website.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
      Name: !FindInMap [EnvMapping, !Ref Env, WebsiteDomain]
      Type: A

  RumIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true
      IdentityPoolName: !Sub HairdressingWeb-${Env}

  RumGuestRoleMapping:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref RumIdentityPool
      Roles:
        "unauthenticated": !GetAtt RumIdentityPoolRole.Arn

  RumIdentityPoolRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub HairdressingWeb-${Env}-RumIdentityPoolRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          Effect: Allow
          Action:
            - sts:AssumeRoleWithWebIdentity
          Principal:
            Federated:
              - cognito-identity.amazonaws.com
          Condition:
            StringEquals:
              cognito-identity.amazonaws.com:aud: !Ref RumIdentityPool
            ForAnyValue:StringLike:
              cognito-identity.amazonaws.com:amr: "unauthenticated"
      Policies:
        - PolicyName: RumPolicy
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - rum:PutRumEvents
                Resource: !Sub arn:aws:rum:${AWS::Region}:${AWS::AccountId}:appmonitor/HairdressingWeb-${Env}

  RumAppMonitor:
    Type: AWS::RUM::AppMonitor
    Properties:
      Domain: "*.bertajudit.hu"
      Name: !Sub HairdressingWeb-${Env}
      AppMonitorConfiguration:
        IdentityPoolId: !Ref RumIdentityPool
        SessionSampleRate: 1
        Telemetries:
          - errors
          - performance
          - http
        AllowCookies: true

Outputs:
  HairdressingWeb:
    Description: "Hairdressing Web"
    Value: !Sub
      - "https://${Domain}"
      - Domain: !FindInMap [EnvMapping, !Ref Env, WebsiteDomain]
  WebsiteBucket:
    Value: !Ref WebsiteBucket
  RumAppMonitorId:
    Value: !GetAtt RumAppMonitor.Id
  RumIdentityPoolId:
    Value: !Ref RumIdentityPool
